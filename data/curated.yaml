repos:
  - name: "karpathy/autoresearch"
    url: "https://github.com/karpathy/autoresearch"
    positioning: "The cleanest reference loop: an agent edits a single training file, runs a fixed-budget experiment, and keeps only the improvements"
    why_it_matters: "This is the conceptual baseline for the field because it reduces autoresearch to a tight modify-run-measure-select loop"
    relation: "Defines the smallest serious unit of autonomous ML research"
    representative: "karpathy/autoresearch README and program.md design"
    status: "landmark"
    category: "reference_loop"
  - name: "SakanaAI/AI-Scientist"
    url: "https://github.com/SakanaAI/AI-Scientist"
    positioning: "A widely recognized end-to-end system for idea generation, coding, experimentation, writing, and simulated review"
    why_it_matters: "It moved the discussion from isolated research subtasks to complete research-loop automation"
    relation: "The key milestone for end-to-end AI scientist systems"
    representative: "The AI Scientist paper and project release"
    status: "landmark"
    category: "end_to_end_ai_scientists"
  - name: "SakanaAI/AI-Scientist-v2"
    url: "https://github.com/SakanaAI/AI-Scientist-v2"
    positioning: "A generalized successor that uses agentic tree search for open-ended scientific discovery"
    why_it_matters: "It pushes beyond rigid templates and emphasizes exploratory search over research trajectories"
    relation: "Represents the shift from scripted pipelines to search-based AI scientist systems"
    representative: "The AI Scientist-v2 paper and release"
    status: "active"
    category: "end_to_end_ai_scientists"
  - name: "allenai/autodiscovery"
    url: "https://github.com/allenai/autodiscovery"
    positioning: "A discovery-oriented system for hypothesis search and verification driven by Bayesian surprise and MCTS"
    why_it_matters: "It anchors the scientific-discovery branch of autoresearch instead of focusing only on engineering loops"
    relation: "Important for open-ended hypothesis generation and validation"
    representative: "Autodiscovery NeurIPS 2025 release"
    status: "active"
    category: "end_to_end_ai_scientists"
  - name: "AutoResearch/autora"
    url: "https://github.com/AutoResearch/autora"
    positioning: "A modular framework for closed-loop empirical research with theorists, experimentalists, and experiment runners"
    why_it_matters: "It predates the current AI scientist wave and gives a principled framework for automating empirical science"
    relation: "Core foundation for closed-loop science rather than code-only autoresearch"
    representative: "AutoRA JOSS 2024"
    status: "landmark"
    category: "closed_loop_science"
  - name: "HKUDS/AI-Researcher"
    url: "https://github.com/HKUDS/AI-Researcher"
    positioning: "A production-ready system for literature review, hypothesis generation, implementation, and manuscript preparation"
    why_it_matters: "It couples end-to-end automation with Scientist-Bench style evaluation"
    relation: "A strong reference for paper-to-implementation scientific workflows"
    representative: "AI-Researcher: Autonomous Scientific Innovation"
    status: "active"
    category: "end_to_end_ai_scientists"
  - name: "eimenhmdt/autoresearcher"
    url: "https://github.com/eimenhmdt/autoresearcher"
    positioning: "An early open-source attempt at automating scientific workflows, currently focused on literature review"
    why_it_matters: "Useful as a lightweight prototype for the literature-to-insight side of autoresearch"
    relation: "Relevant when research automation starts from retrieval and synthesis"
    representative: "AutoResearcher project README"
    status: "prototype"
    category: "literature_and_review_agents"
  - name: "ltjed/freephdlabor"
    url: "https://github.com/ltjed/freephdlabor"
    positioning: "A customizable multiagent framework for continual and interactive science automation"
    why_it_matters: "It emphasizes persistent workflows, modular agents, and domain customization instead of one-shot demos"
    relation: "Important for building durable research-agent infrastructure"
    representative: "Build Your Personalized Research Group technical report"
    status: "active"
    category: "infrastructure_and_tools"
  - name: "wanshuiyin/Auto-claude-code-research-in-sleep"
    url: "https://github.com/wanshuiyin/Auto-claude-code-research-in-sleep"
    positioning: "A practical Claude Code workflow that runs research review, diagnosis, and experiment loops overnight"
    why_it_matters: "It turns autoresearch into an operational nightly workflow rather than a one-off showcase"
    relation: "Useful as a hands-on automation layer for code-centric research loops"
    representative: "ARIS README and Claude Code skills workflow"
    status: "active"
    category: "infrastructure_and_tools"

landmark_papers:
  - title: "AutoRA: Automated Research Assistant for Closed-Loop Empirical Research"
    url: "https://joss.theoj.org/papers/10.21105/joss.06839"
    summary: "A foundational framework for closed-loop empirical research with explicit theorist and experimentalist roles."
    themes:
      - "closed_loop_empirical_science"
      - "autoresearch_loops"
  - title: "The AI Scientist: Towards Fully Automated Open-Ended Scientific Discovery"
    url: "https://arxiv.org/abs/2408.06292"
    summary: "The 2024 milestone that made end-to-end AI scientist systems concrete for ML research."
    themes:
      - "end_to_end_ai_scientists"
      - "autoresearch_loops"
  - title: "The AI Scientist-v2: Workshop-Level Automated Scientific Discovery via Agentic Tree Search"
    url: "https://arxiv.org/abs/2504.08066"
    summary: "A search-based follow-up that moves beyond rigid templates toward more open-ended exploration."
    themes:
      - "end_to_end_ai_scientists"
      - "autonomous_discovery"
  - title: "AI-Researcher: Autonomous Scientific Innovation"
    url: "https://arxiv.org/abs/2505.18705"
    summary: "An autonomous pipeline from literature review to implementation and manuscript generation, paired with Scientist-Bench."
    themes:
      - "end_to_end_ai_scientists"
      - "research_infrastructure_and_benchmarks"
  - title: "Build Your Personalized Research Group: A Multiagent Framework for Continual and Interactive Science Automation"
    url: "https://arxiv.org/abs/2510.15624"
    summary: "A strong framework paper on persistent, customizable research groups rather than one-shot autonomous runs."
    themes:
      - "research_infrastructure_and_benchmarks"
  - title: "Autodiscovery"
    url: "https://github.com/allenai/autodiscovery"
    summary: "An open-ended discovery system centered on hypothesis search and verification."
    themes:
      - "autonomous_discovery"
